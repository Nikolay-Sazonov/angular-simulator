<header class="header flex">
  <div class="header-wrapper flex">
    <div class="company-wrapper ">
      <div class="img-company">
        <img src="/images/icon/company-icon.svg" alt="иконка компании">
      </div>
      <div class="name-company fs-16">
        <span >румтибет</span>
      </div>
    </div>
    <nav class="header-menu flex fs-18">
      <ul class="menu-list flex">
        <li class="menu-item"><a href="#" class="menu-link">Главная</a></li>
        <li class="menu-item"><a href="#" class="menu-link">Про гида</a></li>
        <li class="menu-item"><a href="#" class="menu-link">Программа тура</a></li>
        <li class="menu-item"><a href="#" class="menu-link">Стоимость</a></li>
        <li class="menu-item"><a href="#" class="menu-link">Блог</a></li>
        <li class="menu-item"><a href="#" class="menu-link">Контакты</a></li>
      </ul>
    </nav>
    <button id="header__button" class="header-button">Консультация</button>
  </div>
</header>
<body>
  <img src="/images/bg/mountains.svg" alt="горы" class="bg-mountains">
    <p class="hero-text">насладитесь прогулкой в горах <br>с командой единомышленников</p>
    <div class="registration-block flex">
      <form class="registration-form flex fs-16">

        <div class="location-wrapper flex fd-c gap">
          <div class="select-wrapper">
            <select name="location" id="location" class="location pop-out-windows pl-10" required>
              <option value="" disabled selected hidden>Локация для тура</option>
              <option value="arshan">Пик любви</option>
              <option value="irkutsk">Гора Витязь</option>
            </select>
          </div>
          <span class="location-wrapper__hint fc-14">выберите из списка</span>
        </div>

        <div class="flex fd-c">
          <input type="date" name="hike-date" id="hike-date" required>
          <span class="date-hint flex fs-14 mt-12 ml-8">укажите дату</span>
        </div>

        <div class="numder-people-wrapper">
          <div class="select-wrapper">
            <select name="number" id="number" class="number-people pop-out-windows pl-10" required>
              <option value="participants-number" disabled selected hidden>Участники</option>
              <option value="quantity">1-3</option>
              <option value="quantity">3-4</option>
            </select>
          </div>
          <span class="numder-people-wrapper__hint flex fs-14 mt-12 ml-8">выберите из списка</span>
        </div>
        <button type="submit" id="search-btn" class="search-btn">Найти прогграмму</button>
      </form>
    </div>
</body>
